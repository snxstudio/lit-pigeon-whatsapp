<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a9c7f" />
      <stop offset="1" stop-color="#075e54" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- brand -->
  <g transform="translate(80 78)">
    <rect width="44" height="44" rx="11" fill="#ffffff" opacity="0.16" />
    <text x="22" y="32" font-size="26" text-anchor="middle">🕊️</text>
    <text x="60" y="30" fill="#ffffff" font-size="24" font-weight="700" letter-spacing="0.5">Lit Pigeon</text>
  </g>

  <!-- headline -->
  <text x="80" y="250" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="-1.5">WhatsApp Template</text>
  <text x="80" y="338" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="-1.5">Editor &amp; Validator</text>

  <text x="80" y="410" fill="#d7efe8" font-size="30" font-weight="500" opacity="0.92">
    Build templates, validate against Meta's rules, preview the chat bubble live.
  </text>

  <!-- chips -->
  <g transform="translate(80 470)" fill="#ffffff" font-size="22" font-weight="600">
    <g>
      <rect width="230" height="48" rx="24" fill="#ffffff" opacity="0.14" />
      <text x="115" y="31" text-anchor="middle">Live preview</text>
    </g>
    <g transform="translate(250 0)">
      <rect width="270" height="48" rx="24" fill="#ffffff" opacity="0.14" />
      <text x="135" y="31" text-anchor="middle">Meta-rule validation</text>
    </g>
    <g transform="translate(540 0)">
      <rect width="250" height="48" rx="24" fill="#ffffff" opacity="0.14" />
      <text x="125" y="31" text-anchor="middle">Cloud API payload</text>
    </g>
  </g>

  <!-- decorative chat bubble -->
  <g transform="translate(915 150)" opacity="0.96">
    <rect width="205" height="150" rx="20" fill="#ffffff" />
    <rect x="24" y="30" width="120" height="14" rx="7" fill="#c9d3cf" />
    <rect x="24" y="60" width="157" height="12" rx="6" fill="#e2e8e5" />
    <rect x="24" y="84" width="120" height="12" rx="6" fill="#e2e8e5" />
    <path d="M148 116l16 16 30-34" fill="none" stroke="#008069" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="1120" y="560" text-anchor="end" fill="#ffffff" font-size="22" opacity="0.8">Free &amp; open source · MIT</text>
</svg>
